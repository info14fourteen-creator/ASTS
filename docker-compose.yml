services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: asts-postgres
    environment:
      POSTGRES_DB: asts
      POSTGRES_USER: asts
      POSTGRES_PASSWORD: asts_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asts -d asts"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: asts-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: asts-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: asts
      MINIO_ROOT_PASSWORD: asts_local_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
